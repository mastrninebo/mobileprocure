<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Place Order | Mobile Procure</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="icon" href="../assets/images/logo.png" type="image/png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#F5F7FA;
color:#1F2937;
padding-bottom:120px;
}

header{

background:white;

padding:20px;

display:flex;

align-items:center;

gap:15px;

box-shadow:0 2px 15px rgba(0,0,0,.05);

}

header a{

text-decoration:none;

color:#0F766E;

font-size:20px;

}

header h2{

font-size:22px;

}

.container{

padding:20px;

}

.card{

background:white;

border-radius:18px;

padding:20px;

margin-bottom:20px;

box-shadow:0 8px 20px rgba(0,0,0,.05);

}

.product{

display:flex;

gap:15px;

align-items:center;

}

.product img{

width:100px;

height:80px;

object-fit:cover;

border-radius:12px;

}

.product h3{

margin-bottom:6px;

}

.product p{

color:#6B7280;

font-size:14px;

}

.badge{

display:inline-block;

margin-top:8px;

background:#DCFCE7;

color:#166534;

padding:6px 10px;

border-radius:20px;

font-size:12px;

font-weight:600;

}

.section-title{

margin-bottom:15px;

font-weight:600;

color:#0F766E;

}

.quantity{

display:flex;

justify-content:center;

align-items:center;

gap:20px;

}

.quantity button{

width:45px;

height:45px;

border:none;

border-radius:50%;

background:#0F766E;

color:white;

font-size:20px;

cursor:pointer;

}

.quantity input{

width:80px;

text-align:center;

font-size:22px;

border:none;

background:#F3F4F6;

padding:10px;

border-radius:10px;

}

.radio-group{

display:flex;

flex-direction:column;

gap:15px;

}

.radio{

background:#F8FAFC;

padding:15px;

border-radius:12px;

}

.radio input{

margin-right:10px;

}

input[type=text],
select,
textarea{

width:100%;

padding:14px;

border:1px solid #E5E7EB;

border-radius:12px;

margin-top:8px;

margin-bottom:18px;

font-size:15px;

outline:none;

}

textarea{

resize:none;

height:100px;

}

.summary{

display:flex;

justify-content:space-between;

margin-bottom:15px;

}

.total{

font-size:22px;

font-weight:700;

color:#0F766E;

}

.footer{

position:fixed;

bottom:0;

left:0;

width:100%;

background:white;

padding:18px;

box-shadow:0 -5px 20px rgba(0,0,0,.08);

}

.btn{

display:block;

width:100%;

text-align:center;

padding:16px;

background:#0F766E;

color:white;

text-decoration:none;

border-radius:14px;

font-weight:600;

font-size:17px;

}

</style>

</head>

<body>

<script type="module">
    import { requireBuyer } from '../assets/js/buyer-page.js';
    await requireBuyer();
</script>

<header>

<a href="livestock-details.html">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2>Place Order</h2>

</header>

<div class="container">

<div class="card">

<div class="product">

<img src="../assets/images/cattle.jpg">

<div>

<h3>Angus Bulls</h3>

<p>Mpundu Cattle Ranch</p>

<span class="badge">Verified Supplier</span>

</div>

</div>

</div>

<div class="card">

<h3 class="section-title">Quantity</h3>

<div class="quantity">

<button onclick="decrease()">−</button>

<input type="text" id="qty" value="50" readonly>

<button onclick="increase()">+</button>

</div>

</div>

<div class="card">

<h3 class="section-title">Transport Option</h3>

<div class="radio-group">

<label class="radio">

<input type="radio" name="transport" checked>

Supplier Transport

</label>

<label class="radio">

<input type="radio" name="transport">

Buyer Arranges Transport

</label>

</div>

</div>

<div class="card">

<h3 class="section-title">Delivery Destination</h3>

<label>Country</label>

<select>

<option>Zambia</option>

<option>South Africa</option>

<option>DR Congo</option>

<option>Botswana</option>

</select>

<label>Province / State</label>

<input type="text" placeholder="Enter Province">

<label>Delivery Address</label>

<textarea placeholder="Warehouse, Farm or Business Address"></textarea>

<label>Special Instructions</label>

<textarea placeholder="Additional notes..."></textarea>

</div>

<div class="card">

<h3 class="section-title">Order Summary</h3>

<div class="summary">

<span>50 × $1,250</span>

<span>$62,500</span>

</div>

<div class="summary">

<span>Transport</span>

<span>$1,200</span>

</div>

<div class="summary">

<span>Escrow Fee</span>

<span>$250</span>

</div>

<hr style="margin:15px 0;">

<div class="summary total">

<span>Total</span>

<span>$63,950</span>

</div>

</div>

</div>

<div class="footer">

<a href="order-review.html" class="btn">

Proceed to Review

</a>

</div>

<script>

function increase(){

let qty=document.getElementById("qty");

qty.value=parseInt(qty.value)+1;

}

function decrease(){

let qty=document.getElementById("qty");

if(qty.value>1){

qty.value=parseInt(qty.value)-1;

}

}

</script>

</body>
</html>
