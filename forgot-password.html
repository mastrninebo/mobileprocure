<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Procure | Forgot Password</title>

<link rel="icon" href="assets/images/logo.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#F5F7FA;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:430px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:85px;
margin-bottom:10px;
}

.logo h1{
color:#0D7377;
font-size:28px;
}

.logo p{
color:#6B7280;
font-size:14px;
}

.card{
background:#fff;
padding:30px;
border-radius:22px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.icon{
width:90px;
height:90px;
margin:0 auto 20px;
background:#E6F7F7;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
color:#0D7377;
}

.portal{
background:#F0FDFA;
padding:15px;
border-radius:15px;
margin-bottom:25px;
text-align:center;
}

.portal h3{
color:#0D7377;
margin-bottom:5px;
}

.portal p{
font-size:13px;
color:#6B7280;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:500;
}

.input-box{
display:flex;
align-items:center;
border:1px solid #D1D5DB;
border-radius:12px;
padding:13px;
}

.input-box i{
margin-right:10px;
color:#9CA3AF;
}

.input-box input{
border:none;
outline:none;
width:100%;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#0D7377;
border:none;
border-radius:12px;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#095A5C;
}

.info{
margin-top:20px;
padding:15px;
background:#F9FAFB;
border-left:4px solid #0D7377;
border-radius:10px;
font-size:14px;
color:#4B5563;
line-height:1.6;
}

.links{
margin-top:25px;
text-align:center;
}

.links a{
display:block;
text-decoration:none;
margin:10px 0;
color:#0D7377;
font-weight:500;
}

.admin-message{
display:none;
margin-top:20px;
padding:18px;
background:#FEF3C7;
border-left:5px solid #F59E0B;
border-radius:12px;
color:#92400E;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="assets/images/logo.png" alt="Logo">

<h1>Mobile Procure</h1>

<p>Password Recovery</p>

</div>

<div class="card">

<div class="icon">

<i class="fa-solid fa-key"></i>

</div>

<div class="portal">

<h3 id="portalTitle">Buyer Portal</h3>

<p id="portalSubtitle">
Recover access to your account.
</p>

</div>

<form id="resetForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email" placeholder="Enter your registered email">

</div>

</div>

<button>

<i class="fa-solid fa-paper-plane"></i>

 Send Reset Link

</button>

</form>

<div class="admin-message" id="adminMessage">

<strong>Password Assistance</strong>

<p id="adminText"></p>

</div>

<div class="info">

A password reset link will be sent to your registered email address. Follow the instructions in the email to create a new password.

</div>

<div class="links">

<a href="login.html">

<i class="fa-solid fa-right-to-bracket"></i>

 Back to Login

</a>

<a href="continue-as.html">

<i class="fa-solid fa-arrow-left"></i>

 Choose Another Portal

</a>

</div>

</div>

</div>

<script>

const role = localStorage.getItem("selectedRole") || "buyer";

const title = document.getElementById("portalTitle");
const subtitle = document.getElementById("portalSubtitle");
const adminMessage = document.getElementById("adminMessage");
const adminText = document.getElementById("adminText");
const resetForm = document.getElementById("resetForm");

const portals = {

buyer:{
title:"Buyer Portal",
subtitle:"Recover your buyer account."
},

supplier:{
title:"Supplier Portal",
subtitle:"Recover your supplier account."
},

logistics:{
title:"Logistics Portal",
subtitle:"Recover your logistics account."
},

government:{
title:"Government Portal",
subtitle:"Administrator-managed accounts.",
restricted:true,
message:"Government accounts are managed by the Mobile Procure System Administrator. Please contact your ICT Administrator or Platform Administrator for password assistance."
},

fintech:{
title:"Fintech Portal",
subtitle:"Administrator-managed accounts.",
restricted:true,
message:"Fintech partner accounts are managed by Mobile Procure Administration. Please contact your institution's administrator or Mobile Procure Support."
}

};

const current = portals[role];

title.innerText = current.title;
subtitle.innerText = current.subtitle;

if(current.restricted){

resetForm.style.display="none";
adminMessage.style.display="block";
adminText.innerText=current.message;

}

</script>

</body>
</html>
